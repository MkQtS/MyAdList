name: Generate my adlists

on:
  schedule:
    - cron: 0 22 * * *
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Basic preparation
        run: |
          mkdir -p title addon fop dns ubo
          echo "VERSION_CODE=$(date -d "8 hour" -u +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "MODIFY_TIME=$(date -d "8 hour" -u "+%Y.%m.%d %H:%M UTC+8")" >> $GITHUB_ENV

      - name: Get source files
        env:
          ADLIST_TITLE: https://raw.githubusercontent.com/MkQtS/MyAdList/main/material/AddonTitle.txt
          DNSLIST_TITLE: https://raw.githubusercontent.com/MkQtS/MyAdList/main/material/DNSTitle.txt
          UBLOCK_TITLE: https://raw.githubusercontent.com/MkQtS/MyAdList/main/material/uBoTitle.txt
          EASYLIST: https://easylist-downloads.adblockplus.org/easylist_noelemhide.txt
          EASYLISTCHINA: https://raw.githubusercontent.com/easylist/easylistchina/master/easylistchina.txt
          CJX_ANNOYANCE: https://raw.githubusercontent.com/cjx82630/cjxlist/master/cjx-annoyance.txt
          ADDITION_RULES: https://raw.githubusercontent.com/MkQtS/MyAdList/main/material/Additions.txt
          EASYPRIVACY_0: https://easylist-downloads.adblockplus.org/easyprivacy_nointernational.txt
          EASYPRIVACY_1: https://raw.githubusercontent.com/easylist/easylist/master/easyprivacy/easyprivacy_allowlist_international.txt
          EASYPRIVACY_2: https://raw.githubusercontent.com/easylist/easylist/master/easyprivacy/easyprivacy_specific_international.txt
          EASYPRIVACY_3: https://raw.githubusercontent.com/easylist/easylist/master/easyprivacy/easyprivacy_thirdparty_international.txt
          EASYPRIVACY_4: https://raw.githubusercontent.com/easylist/easylist/master/easyprivacy/easyprivacy_trackingservers_international.txt
          FOP_SCRIPT: https://raw.githubusercontent.com/easylist/easylist/master/FOP.py
          ADGUARD_DNS: https://filters.adtidy.org/windows/filters/15_optimized.txt
          ANTI_AD_ADGUARD: https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-adguard.txt
          PETER_LOWE: https://pgl.yoyo.org/adservers/serverlist.php?hostformat=adblockplus&mimetype=plaintext
          UBLOCK_FILTERS: https://raw.githubusercontent.com/uBlockOrigin/uAssets/master/filters/filters.txt
          UBLOCK_BADWARE: https://raw.githubusercontent.com/uBlockOrigin/uAssets/master/filters/badware.txt
          UBLOCK_PRIVACY: https://raw.githubusercontent.com/uBlockOrigin/uAssets/master/filters/privacy.txt
          UBLOCK_ABUSE: https://raw.githubusercontent.com/uBlockOrigin/uAssets/master/filters/resource-abuse.txt
          UBLOCK_UNBREAK: https://raw.githubusercontent.com/uBlockOrigin/uAssets/master/filters/unbreak.txt
          UBLOCK_QUICK: https://raw.githubusercontent.com/uBlockOrigin/uAssets/master/filters/quick-fixes.txt
          UBLOCK_2020: https://raw.githubusercontent.com/uBlockOrigin/uAssets/master/filters/filters-2020.txt
          UBLOCK_2021: https://raw.githubusercontent.com/uBlockOrigin/uAssets/master/filters/filters-2021.txt
          UBLOCK_2022: https://raw.githubusercontent.com/uBlockOrigin/uAssets/master/filters/filters-2022.txt
        run: |
          cd ./title
          curl -s $ADLIST_TITLE | sed -e "s/BLANKVER/$VERSION_CODE/" -e "s/BLANKTIME/$MODIFY_TIME/" > addon0.txt
          curl -s $DNSLIST_TITLE | sed -e "s/BLANKVER/$VERSION_CODE/" -e "s/BLANKTIME/$MODIFY_TIME/" > dns0.txt
          curl -s $UBLOCK_TITLE | sed -e "s/BLANKVER/$VERSION_CODE/" -e "s/BLANKTIME/$MODIFY_TIME/" > ubo0.txt
          cd ../addon
          curl -s $EASYLIST | sed -e '/^\[Adblock/d' -e '$G' > ad1.txt
          curl -s $EASYLISTCHINA | sed -e '/^\[Adblock/d' -e '$G' > ad2.txt
          curl -s $CJX_ANNOYANCE | sed -e '/^\[Adblock/d' -e '/^!#include/d' -e '$G' > ad3.txt
          curl -s $ADDITION_RULES | sed '$G' > rawad4.txt
          curl -s $EASYPRIVACY_0 | sed -e '/^\[Adblock/d' -e '$G' > pri0.txt
          curl -s $EASYPRIVACY_1 | sed -n '/^!---------- Chinese/,/^!---------- Czech/p' | sed '$G' > pri1.txt
          curl -s $EASYPRIVACY_2 | sed -n '/^! Chinese/,/^! Croatian/p' | sed '$G' > pri2.txt
          curl -s $EASYPRIVACY_3 | sed -n '/^! Chinese/,/^! Croatian/p' | sed '$G' > pri3.txt
          curl -s $EASYPRIVACY_4 | sed -n '/^! Chinese/,/^! Croatian/p' | sed '$G' > pri4.txt
          cd ../fop
          curl -s $FOP_SCRIPT > FOP.py
          cd ../dns
          curl -s $ADGUARD_DNS | sed -e '/^[^|@]/d' -e '$G' > dns1.txt
          curl -s $ANTI_AD_ADGUARD | sed -e '/^!/d' -e '$G' > dns2.txt
          curl -s $PETER_LOWE | sed -e '/^!/d' -e '/^\[Adblock/d' -e '$G' > dns3.txt
          cd ../ubo
          curl -s $UBLOCK_FILTERS | sed -e '/^![^#]/d' -e '/^!#include/d' -e '/^!$/d' -e '$G' > ubo1.txt
          curl -s $UBLOCK_BADWARE | sed -e '/^![^#]/d' -e '/^!$/d' -e '$G' > ubo2.txt
          curl -s $UBLOCK_PRIVACY | sed -e '/^![^#]/d' -e '/^!$/d' -e '$G' > ubo3.txt
          curl -s $UBLOCK_ABUSE | sed -e '/^![^#]/d' -e '/^!$/d' -e '$G' > ubo4.txt
          curl -s $UBLOCK_UNBREAK | sed -e '/^![^#]/d' -e '/^!$/d' -e '$G' > ubo5.txt
          curl -s $UBLOCK_QUICK | sed -e '/^![^#]/d' -e '/^!$/d' -e '$G' > ubo6.txt
          curl -s $UBLOCK_2020 | sed -e '/^![^#]/d' -e '/^!$/d' -e '$G' > ubo7.txt
          curl -s $UBLOCK_2021 | sed -e '/^![^#]/d' -e '/^!$/d' -e '$G' > ubo8.txt
          curl -s $UBLOCK_2022 | sed -e '/^![^#]/d' -e '/^!$/d' -e '$G' > ubo9.txt

      - name: Arrange addon rules
        run: |
          cd ./addon
          sed '/+js/d' rawad4.txt > ad4.txt
          sed -n '/+js/p' rawad4.txt > advanced.txt
          cat ad1.txt ad2.txt ad3.txt ad4.txt | sed 's/\r//g' > adcombined.txt
          cat pri0.txt pri1.txt pri2.txt pri3.txt pri4.txt | sed 's/\r//g' > pricombined.txt
          cat adcombined.txt pricombined.txt | sed '/^!/d' | sort -u > sourcerules.txt
          sed -n '/^##/p' sourcerules.txt > general_hide.txt
          sed '/^##/d' sourcerules.txt > addonrules0.txt
          sed -n '/^||/p' addonrules0.txt > redun_raw.txt
          sed -n '/\^$/p' redun_raw.txt > redun0.txt
          sed -n '/\^\$third-party$/p' redun_raw.txt > redun_check1.txt
          sed -n '/\^\$popup$/p' redun_raw.txt > redun_check2.txt
          sed -n '/\^\$popup,third-party$/p' redun_raw.txt > redun_check3.txt
          sed -n '/\^\$script$/p' redun_raw.txt > redun_check4.txt
          sed -n '/\^\$script,third-party$/p' redun_raw.txt > redun_check5.txt
          sed -n '/\^\$image$/p' redun_raw.txt > redun_check6.txt
          sed -n '/\^\$image,third-party$/p' redun_raw.txt > redun_check7.txt
          cat redun0.txt redun_check1.txt redun_check2.txt redun_check3.txt redun_check4.txt redun_check5.txt redun_check6.txt redun_check7.txt | sort > redun_check.txt
          diff addonrules0.txt redun_check.txt | grep -E '< .+' | sed 's/^..//g' > addonrules1.txt
          sed 's/\$third-party//g' redun_check1.txt > redun1.txt
          sed 's/\$popup//g' redun_check2.txt > redun2.txt
          sed 's/\$popup,third-party//g' redun_check3.txt > redun3.txt
          sed 's/\$script//g' redun_check4.txt > redun4.txt
          sed 's/\$script,third-party//g' redun_check5.txt > redun5.txt
          sed 's/\$image//g' redun_check6.txt > redun6.txt
          sed 's/\$image,third-party//g' redun_check7.txt > redun7.txt
          cat redun1.txt redun3.txt redun5.txt redun7.txt | sort -u > redun_3p.txt
          cat redun2.txt redun3.txt | sort -u > redun_pop.txt
          cat redun4.txt redun5.txt | sort -u > redun_script.txt
          cat redun6.txt redun7.txt | sort -u > redun_image.txt
          diff redun0.txt redun_3p.txt | grep -E '> .+' | sed 's/^..//g' > redun_3p_1.txt
          diff redun0.txt redun_pop.txt | grep -E '> .+' | sed 's/^..//g' > redun_pop_1.txt
          diff redun0.txt redun_script.txt | grep -E '> .+' | sed 's/^..//g' > redun_script_1.txt
          diff redun0.txt redun_image.txt | grep -E '> .+' | sed 's/^..//g' > redun_image_1.txt
          comm -12 redun_3p_1.txt redun_pop_1.txt > redun_3p_pop.txt
          comm -12 redun_3p_1.txt redun_script_1.txt > redun_3p_script.txt
          comm -12 redun_3p_1.txt redun_image_1.txt > redun_3p_image.txt
          diff redun_3p_1.txt redun_pop_1.txt | grep -E '> .+' | sed 's/^..//g' > redun_pop_only.txt
          diff redun_3p_1.txt redun_script_1.txt | grep -E '> .+' | sed 's/^..//g' > redun_script_only.txt
          diff redun_3p_1.txt redun_image_1.txt | grep -E '> .+' | sed 's/^..//g' > redun_image_only.txt
          cat redun_3p_1.txt redun_pop_1.txt redun_script_1.txt redun_image_1.txt | sort -u > redun_passed_all.txt
          cat redun_pop_1.txt redun_script_1.txt redun_image_1.txt | sort -u > redun_passed_for3p.txt
          diff redun_passed_for3p.txt redun_passed_all.txt | grep -E '> .+' | sed 's/^..//g' > redun_3p_only.txt
          sed -e 's/\^/\^\$third-party/g' -e '$G' redun_3p_only.txt > redun_part1.txt
          sed -e 's/\^/\^\$popup/g' -e '$G' redun_pop_only.txt > redun_part2.txt
          sed -e 's/\^/\^\$popup,third-party/g' -e '$G' redun_3p_pop.txt > redun_part3.txt
          sed -e 's/\^/\^\$script/g' -e '$G' redun_script_only.txt > redun_part4.txt
          sed -e 's/\^/\^\$script,third-party/g' -e '$G' redun_3p_script.txt > redun_part5.txt
          sed -e 's/\^/\^\$image/g' -e '$G' redun_image_only.txt > redun_part6.txt
          sed -e 's/\^/\^\$image,third-party/g' -e '$G' redun_3p_image.txt > redun_part7.txt
          cat redun0.txt redun_part1.txt redun_part2.txt redun_part3.txt redun_part4.txt redun_part5.txt redun_part6.txt redun_part7.txt > addonrules2.txt
          cat addonrules1.txt addonrules2.txt > ../fop/addon_fop.txt
          cd ../fop
          python FOP.py
          cd ../addon
          cat general_hide.txt ../fop/addon_fop.txt advanced.txt | sed '/^$/d' > ../title/addonrules.txt

      - name: Combine DNS lists
        run: |
          cd ./dns
          cat dns1.txt dns2.txt dns3.txt | sed -e 's/\^|/\^/g' -e 's/\$important//g' -e 's/\r//g' > dnscombined.txt
          sed -n '/^@@/p' dnscombined.txt | sed 's/@@|/@@||/g' | sed 's/@@|||/@@||/g' > except0.txt
          sed 's/@@//g' except0.txt | sort -u > except1.txt
          sed -e '/^@@/d' -e '/[^^]$/d' dnscombined.txt | sort -u > common0.txt
          diff except1.txt common0.txt | grep -E '> .+' | sed 's/^..//g' > common.txt
          sed 's/^/@@/g' except1.txt > except.txt
          cat except.txt common.txt | sed '/^$/d' > ../title/dnslist.txt

      - name: Combine uBlock lists
        run: |
          cd ./ubo
          cat ubo1.txt ubo2.txt ubo3.txt ubo4.txt ubo5.txt ubo6.txt ubo7.txt ubo8.txt ubo9.txt | sed 's/\r//g' > ubocombined0.txt
          sed '/^!#if/,/^!#endif/d' ubocombined0.txt | sort -u > ubocombined1.txt
          sed -n '/^!#if/,/^!#endif/p' ubocombined0.txt > uboif0.txt
          sed -n '/^!#if env_chromium/,/^!#endif/p' uboif0.txt > uboifchrome0.txt
          sed -n '/^!#if env_firefox/,/^!#endif/p' uboif0.txt > uboiffire0.txt
          sed -n '/^!#if env_mobile/,/^!#endif/p' uboif0.txt > uboifmob0.txt
          sed -n '/^!#if !env_mobile/,/^!#endif/p' uboif0.txt > uboifnomob0.txt
          sed '/^!/d' uboifchrome0.txt | sort -u | sed -e '1i !#if env_chromium' -e '$a !#endif\n' > uboifchrome.txt
          sed '/^!/d' uboiffire0.txt | sort -u | sed -e '1i !#if env_firefox' -e '$a !#endif\n' > uboiffire.txt
          sed '/^!/d' uboifmob0.txt | sort -u | sed -e '1i !#if env_mobile' -e '$a !#endif\n' > uboifmob.txt
          sed '/^!/d' uboifnomob0.txt | sort -u | sed -e '1i !#if !env_mobile' -e '$a !#endif\n' > uboifnomob.txt
          sed -e '/^!#if env_chromium/,/^!#endif/d' -e '/^!#if env_firefox/,/^!#endif/d' -e '/^!#if env_mobile/,/^!#endif/d' -e '/^!#if !env_mobile/,/^!#endif/d' uboif0.txt > uboifleft.txt
          cat uboifchrome.txt uboiffire.txt uboifmob.txt uboifnomob.txt uboifleft.txt > uboif.txt
          cat ubocombined1.txt uboif.txt | sed '/^$/d' > ../title/ubolist.txt

      - name: Add titles and Delete temp files
        run: |
          cd ./title
          cat addon0.txt addonrules.txt > ../addonlist.txt
          cat dns0.txt dnslist.txt > ../dnsblock.txt
          cat ubo0.txt ubolist.txt > ../ublocklist.txt
          cd ..
          rm -rf title addon fop dns ubo

      - name: Commit
        run: |
          git config user.name "actions"
          git config user.email "action@github.com"
          git add --all
          git commit -m "Updated on ${{ env.MODIFY_TIME }}"
          git push origin main

      - name: Purge jsDelivr
        run: |
          curl -sS https://purge.jsdelivr.net/gh/MkQtS/MyAdList@main/addonlist.txt
          curl -sS https://purge.jsdelivr.net/gh/MkQtS/MyAdList@main/dnsblock.txt
          curl -sS https://purge.jsdelivr.net/gh/MkQtS/MyAdList@main/ublocklist.txt
